size="9.5px" fill="#475569" text-anchor="start">flatten in raster order -&gt;</text><text x="246.0" y="172.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#94A3B8" text-anchor="start">p1  p2  p3  p4  p5  p6  p7  p8 ...</text><text x="90.0" y="268.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start" font-weight="600">OUT: the next token at every position  (input shifted by one)</text><text x="90.0" y="512.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">IN: text prompt tokens (amber) + image patch tokens (the flower, in raster order)</text><text x="344.2" y="430.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">whole sequence</text><text x="507.0" y="308.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#B91C1C" text-anchor="start">&lt;- predicted: append p6,</text><text x="507.0" y="321.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#B91C1C" text-anchor="start">   then feed back &amp; repeat</text><text x="756.0" y="346.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#B91C1C" text-anchor="start">the image so far</text><text x="756.0" y="492.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">each step fills one more patch</text><text x="57.0" y="53.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">token and repeat.</text><text x="57.0" y="37.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">sequence to the same sequence shifted by one — each position predicts the token that should come next. Generation = append the predicted</text><text x="57.0" y="20.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">An image is a sequence of patch-tokens; prepend the text prompt and you have one multimodal token stream. The AR model maps the input</text><text x="57.0" y="3.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Autoregressive generation, illustrated — in: a token sequence, out: the next token at every position</text></g></svg>