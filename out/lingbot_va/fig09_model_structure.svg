ke-linecap="butt" /><text x="60.0" y="532.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">block weights (QKV/O/FFN/norms)</text><text x="380.0" y="532.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">per modality</text><text x="600.0" y="532.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">ONE shared set</text><text x="60.0" y="552.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">width</text><text x="380.0" y="552.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">video 3072 / action 768</text><text x="600.0" y="552.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">all 3072</text><text x="60.0" y="572.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">kept apart by</text><text x="380.0" y="572.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">separate weights</text><text x="600.0" y="572.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">attention mask (fig5)</text><text x="60.0" y="592.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">params</text><text x="380.0" y="592.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">5.3B</text><text x="600.0" y="592.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#334155" text-anchor="start">~5.0B</text><text x="60.0" y="624.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#9F1239" text-anchor="start">Fossil: _keep_in_fp32_modules (model.py:581-593) still lists action_norm1/2/3, scale_shift_table_action — modules absent from the shipped block. The release matches</text><text x="60.0" y="638.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#9F1239" text-anchor="start">the paper's own &quot;Share Weights&quot; ablation, not the headline dual-stream MoT.</text><text x="60.0" y="73.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">(paper: two per-modality streams 3072/768; code: one shared 3072 stream, modalities kept apart by the attention mask).</text><text x="60.0" y="57.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">One spine, drawn once: video+action embed → 30 blocks → heads. The I/O modules are split by modality in BOTH. The only structural difference is the 30 blocks</text><text x="60.0" y="40.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 9 · Same DiT backbone — the paper SPLITS the block weights per modality, the code SHARES them</text></g></svg>