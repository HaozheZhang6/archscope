.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.1"/><text x="463.8" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">pixels</text><circle cx="515.1" cy="102.5" r="6.5" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/><circle cx="515.1" cy="102.5" r="2.6" fill="#475569" /><text x="527.6" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">sample (reparameterize)</text></g><g id="labels"><text x="70.0" y="136.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#7C2D12" text-anchor="start" font-weight="700">ENCODER</text><rect x="420.4" y="156.5" width="70.0" height="15.5" rx="3" fill="#FFFFFF"/><text x="455.4" y="166.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">mu, log_var</text><rect x="528.5" y="157.0" width="11.9" height="15.5" rx="3" fill="#FFFFFF"/><text x="534.4" y="166.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">z</text><text x="1156.4" y="136.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#7C2D12" text-anchor="start" font-weight="700">DECODER  (mirror)</text><rect x="1211.5" y="162.5" width="11.9" height="15.5" rx="3" fill="#FFFFFF"/><text x="1217.4" y="172.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">z</text><text x="70.0" y="558.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">CAUSAL: every CausalConv3d pads only the PAST in time, so latent frame f depends only on video frames ≤ its time — that is</text><text x="70.0" y="571.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">why F frames → (F−1)/4+1 latent frames, and why lingbot can encode the stream CHUNK BY CHUNK in real time (feat_cache),</text><text x="70.0" y="584.6" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">instead of needing the whole clip (fig 11b).</text><text x="1156.4" y="544.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">Compression (lingbot / Wan2.2): (3, F, H, W) → (48, F/4, H/16, W/16) ≈ a few-fold fewer numbers, so the DiT</text><text x="1156.4" y="557.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">works in this compact latent. Wan2.1-VACE's VAE is the same family but 16-ch, /8 spatial.</text><text x="70.0" y="79.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">encode chunk-by-chunk (fig 11b).</text><text x="70.0" y="63.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">Encoder: CausalConv3d stem → 4 down-stages (2 residual blocks each, spatial /2 per stage → /16; two stages also halve time → /4) → mid (resblock+attn+resblock) → head → (mu, log_var). Sample z, normalize by per-channel mean/std. Decoder mirrors it. CAUSAL in time ⇒</text><text x="70.0" y="46.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 11a · lingbot's VAE (Wan2.2) — a 3D CAUSAL conv VAE: video ↔ 48-ch latent (/16 spatial, /4 temporal)</text></g></svg>