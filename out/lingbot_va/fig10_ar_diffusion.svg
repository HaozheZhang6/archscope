e-width="1.3"/><text x="1172.3" y="367.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#831843" text-anchor="middle" font-weight="500">diffusion timestep  s  -&gt;  AdaLN</text><text x="1172.3" y="381.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">temb + scale_shift_table -&gt; 6 params (shift,scale,gate)x2 · model.py:524 · conditions EVERY block</text><rect x="882.3" y="408.5" width="162.1" height="44.0" rx="7" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.3"/><rect x="883.5" y="412.5" width="3.2" height="36.0" rx="1.6" fill="#DB2777"/><text x="963.3" y="431.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#831843" text-anchor="middle" font-weight="500">umT5 text</text><text x="963.3" y="445.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">prompt -&gt; cross-attn K/V</text><rect x="832.1" y="227.0" width="556.3" height="44.0" rx="7" fill="#F8FAFC" stroke="#64748B" stroke-width="1.3"/><rect x="833.3" y="231.0" width="3.2" height="36.0" rx="1.6" fill="#059669"/><text x="1110.2" y="250.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#334155" text-anchor="middle" font-weight="500">then: action chunk a2</text><text x="1110.2" y="263.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">same DiT denoises the actions, conditioned on the predicted z2
(inverse dynamics) · s: 0 -&gt; 1</text><rect x="150.0" y="50.0" width="13.0" height="13.0" rx="3.5" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.1"/><text x="169.0" y="60.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">video chunk / latent</text><rect x="289.2" y="50.0" width="13.0" height="13.0" rx="3.5" fill="#D1FAE5" stroke="#059669" stroke-width="1.1"/><text x="308.2" y="60.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">action chunk</text><rect x="391.0" y="50.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#475569" stroke-width="1.1"/><text x="410.0" y="60.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">DiT (denoiser)</text><rect x="498.4" y="50.0" width="13.0" height="13.0" rx="3.5" fill="#E2E8F0" stroke="#475569" stroke-width="1.1"/><text x="517.4" y="60.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">velocity head</text><rect x="602.7" y="50.0" width="13.0" height="13.0" rx="3.5" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.1"/><text x="621.7" y="60.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">diffusion timestep / text</text><rect x="150.0" y="71.0" width="13.0" height="13.0" rx="3.5" fill="url(#hatch-E0F2FE-0284C7)" stroke="#0284C7" stroke-width="1.1"/><text x="169.0" y="81.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">hatched = noised</text></g><g id="labels"><text x="150.0" y="84.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#0F172A" text-anchor="start" font-weight="600">autoregressive: one interleaved video+action sequence, generated chunk by chunk (z = video frame, a = its tau=4 actions)</text><text x="296.5" y="170.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">generate left -&gt; right · chunk t+1 attends &lt;= t</text><text x="150.0" y="194.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#0D9488" text-anchor="start">&lt;- clean history (KV-cache)</text><text x="473.0" y="194.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="end">future -&gt;</text><text x="271.0" y="216.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="middle">zoom: how one chunk is generated</text><rect x="794.6" y="339.0" width="39.7" height="19.0" rx="9.5" fill="#FFFFFF" stroke="#64748B" stroke-width="1.2"/><text x="814.4" y="352.6" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#1E293B" text-anchor="middle" font-weight="600">×30</text><text x="546.7" y="429.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">x T:  integrate s 0 -&gt; 1  (flow matching)</text><text x="797.1" y="243.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">z2</text><text x="150.0" y="511.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start">So: AR is the SEQUENCE axis (interleave video+action, causal, KV-cache, chunk by chunk); diffusion is the WITHIN-CHUNK axis (flow-matching denoise through the DiT, timestep -&gt; AdaLN).</text><text x="150.0" y="527.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">The shared DiT backbone of fig9 is exactly this DiT — one network both predicts video (forward dynamics) and decodes actions (inverse dynamics), at every autoregressive step.</text><text x="150.0" y="33.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">(diffusion): each chunk starts as noise and is denoised by the DiT via flow matching; the diffusion timestep drives the per-token AdaLN that conditions every block (-&gt; fig3).</text><text x="150.0" y="17.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">Two axes. SEQUENCE axis (autoregressive): video and action tokens are interleaved into one causal sequence and generated chunk by chunk; the KV-cache holds the clean past (causal mask -&gt; fig5). WITHIN-CHUNK axis</text><text x="150.0" y="0.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 10 · The architecture is AR x diffusion — interleaved causal chunks, each denoised by the DiT</text></g></svg>