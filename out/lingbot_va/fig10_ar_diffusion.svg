pace" font-size="10.0px" fill="#0C4A6E" text-anchor="middle">clean chunk  z2   (→ goes back into the sequence above)</text><rect x="245.0" y="302.0" width="404.5" height="30.0" rx="7" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.3"/><text x="447.2" y="321.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#312E81" text-anchor="middle" font-weight="500">velocity head → predicted v_theta   (OUT: same shape as z2)</text><rect x="319.2" y="363.0" width="256.0" height="30.0" rx="7" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.3"/><text x="447.2" y="382.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#14532D" text-anchor="middle" font-weight="500">FFN</text><rect x="319.2" y="402.0" width="256.0" height="30.0" rx="7" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/><text x="447.2" y="421.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#1E3A8A" text-anchor="middle" font-weight="500">cross-attention  ← text</text><rect x="313.2" y="441.0" width="268.0" height="30.0" rx="7" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/><text x="447.2" y="460.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#1E3A8A" text-anchor="middle" font-weight="500">self-attention  (causal mask, KV-cache)</text><rect x="299.3" y="502.0" width="295.9" height="22.0" rx="11.0" fill="url(#hatch-E0F2FE-0284C7)" stroke="#0284C7" stroke-width="1.1"/><text x="447.2" y="516.6" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#0C4A6E" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">IN: noised chunk  z2^(s)   (pure noise at s=0)</text><rect x="674.2" y="387.0" width="176.0" height="44.0" rx="7" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.3"/><text x="762.2" y="410.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#831843" text-anchor="middle" font-weight="500">diffusion timestep s</text><text x="762.2" y="423.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">model.py:524</text><rect x="674.2" y="445.0" width="176.0" height="44.0" rx="7" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.3"/><rect x="675.4" y="449.0" width="3.2" height="36.0" rx="1.6" fill="#DB2777"/><text x="762.2" y="468.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#831843" text-anchor="middle" font-weight="500">umT5 text</text><text x="762.2" y="481.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">prompt</text><rect x="682.3" y="251.0" width="373.3" height="44.0" rx="7" fill="#F8FAFC" stroke="#64748B" stroke-width="1.3"/><rect x="683.5" y="255.0" width="3.2" height="36.0" rx="1.6" fill="#059669"/><text x="869.0" y="274.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#334155" text-anchor="middle" font-weight="500">then a2: the SAME DiT denoises the action chunk</text><text x="869.0" y="287.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">conditioned on the just-made z2 (inverse dynamics) · s: 0 → 1</text><rect x="60.0" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.1"/><text x="79.0" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">video frame token z</text><rect x="198.9" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#D1FAE5" stroke="#059669" stroke-width="1.1"/><text x="217.9" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">action chunk a</text><rect x="309.6" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#475569" stroke-width="1.1"/><text x="328.6" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">DiT (denoiser)</text><rect x="417.0" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.1"/><text x="436.0" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">velocity head</text><rect x="521.3" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.1"/><text x="540.3" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">diffusion timestep / text</text><rect x="681.3" y="70.0" width="13.0" height="13.0" rx="3.5" fill="url(#hatch-E0F2FE-B91C1C)" stroke="#B91C1C" stroke-width="1.1"/><text x="700.3" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">noised (being denoised)</text></g><g id="labels"><text x="250.0" y="94.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">AUTOREGRESSIVE sequence — generate chunk by chunk:</text><text x="426.0" y="186.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">chunk t+1 attends ≤ t · KV-cache holds the clean past (z1,a1)</text><rect x="314.2" y="340.0" width="250.6" height="19.0" rx="4" fill="#FFFFFF" stroke="#475569" stroke-width="1.1"/><text x="439.5" y="353.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="middle" font-weight="600">DiT block  ×30  (the same shared block)</text><text x="245.0" y="244.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">DIFFUSION within the chunk — flow-matching denoise:</text><text x="421.1" y="208.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">zoom: z2 is made by denoising (below)</text><text x="202.0" y="418.3" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="end" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">x T: integrate s 0 → 1</text><text x="618.0" y="444.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">→ AdaLN</text><text x="602.7" y="411.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">→ K/V</text><text x="652.3" y="267.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">z2 conditions a2</text><text x="60.0" y="558.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">Read it as: AR is the SEQUENCE axis (interleave z &amp; a, causal, KV-cache, chunk by chunk); DIFFUSION is the WITHIN-CHUNK axis (denoise each chunk through the DiT, s → AdaLN). One DiT</text><text x="60.0" y="572.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">does both.</text><text x="60.0" y="53.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">(illustrative).</text><text x="60.0" y="37.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">WITHIN-CHUNK axis (diffusion): each chunk starts as noise and is denoised by the DiT (timestep s → AdaLN). Video frames drawn as frame icons, actions as value chips</text><text x="60.0" y="20.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">SEQUENCE axis (autoregressive): video frames (z) and action chunks (a) interleave into one causal sequence, generated chunk by chunk; KV-cache holds the clean past.</text><text x="60.0" y="3.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 10 · LingBot-VA = AR x diffusion — generate one interleaved video+action sequence, each chunk denoised by the DiT</text></g></svg>