a Neue, Helvetica, Arial, sans-serif" font-size="8.5px" fill="#831843" text-anchor="middle" font-weight="500">frozen</text><rect x="496.3" y="213.5" width="35.7" height="13.0" rx="6.5" fill="#FFFFFF" stroke="#EA580C" stroke-width="0.9" opacity="0.92"/><text x="514.2" y="223.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="8.5px" fill="#7C2D12" text-anchor="middle" font-weight="500">frozen</text><rect x="614.0" y="110.0" width="340.5" height="19.0" rx="4" fill="#FFFFFF" stroke="#475569" stroke-width="1.1"/><text x="784.3" y="123.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="middle" font-weight="600">autoregressive world model  ·  per chunk (K=4 frames)</text><text x="582.0" y="190.3" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="end" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">① z_hat conditions ②</text><text x="785.0" y="332.3" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="start" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">history KV</text><rect x="1192.3" y="160.5" width="35.7" height="13.0" rx="6.5" fill="#FFFFFF" stroke="#EA580C" stroke-width="0.9" opacity="0.92"/><text x="1210.2" y="170.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="8.5px" fill="#7C2D12" text-anchor="middle" font-weight="500">frozen</text><text x="962.2" y="211.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">z_hat</text><text x="990.5" y="215.3" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="start" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">a_t</text><text x="769.0" y="490.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">closed loop: re-encode the real observation</text><text x="60.0" y="78.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">and the loop repeats.</text><text x="60.0" y="62.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">Per autoregressive step the world model runs TWO passes: ① denoise the next video chunk, then ② denoise the action chunk that realizes it (attending to the just-predicted video). Actions are executed, the real observation is re-encoded into the KV-cache,</text><text x="60.0" y="45.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 1 · LingBot-VA — system: prompt + observation  -&gt;  next video chunk + action chunk  (closed loop)</text></g></svg>