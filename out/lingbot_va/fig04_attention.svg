 x="389.6" y="252.0" width="406.3" height="55.0" rx="7" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.3"/><text x="592.7" y="270.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#831843" text-anchor="middle" font-weight="500">3D RoPE on q, k</text><text x="592.7" y="283.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">complex rotation per head · 128 dims = 44 (frame) + 42 (y) + 42 (x)</text><text x="592.7" y="295.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="8.5px" fill="#94A3B8" text-anchor="middle">model.py:258-260, 432-441</text><rect x="495.9" y="327.0" width="193.6" height="44.0" rx="7" fill="#FFFFFF" stroke="#475569" stroke-width="1.3"/><text x="592.7" y="350.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#334155" text-anchor="middle" font-weight="500">split heads</text><text x="592.7" y="363.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">(1, L, 3072) → (1, L, 24, 128)</text><rect x="397.5" y="391.0" width="390.5" height="55.0" rx="7" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.3"/><text x="592.7" y="409.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#713F12" text-anchor="middle" font-weight="500">RMSNorm_q · RMSNorm_k</text><text x="592.7" y="422.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">affine, over the full 3072 (before head split) · v is NOT normed</text><text x="592.7" y="434.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="8.5px" fill="#94A3B8" text-anchor="middle">model.py:325-330, 427-429</text><rect x="498.1" y="466.0" width="189.3" height="55.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="592.7" y="484.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">to_q · to_k · to_v</text><text x="592.7" y="497.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">3 × Linear 3072 → 3072 (bias)</text><text x="592.7" y="509.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="8.5px" fill="#94A3B8" text-anchor="middle">model.py:318-320</text><rect x="480.9" y="541.0" width="223.7" height="22.0" rx="11.0" fill="#F8FAFC" stroke="#64748B" stroke-width="1.1"/><text x="592.7" y="555.6" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#334155" text-anchor="middle">normed hidden states  (1, L, 3072)</text><rect x="40.7" y="194.0" width="275.3" height="21.0" rx="10.5" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.1" stroke-dasharray="3 2.2"/><path d="M 49.234980468749995,204.5 L 51.734980468749995,207.3 L 56.53498046874999,201.5" fill="none" stroke="#16A34A" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/><text x="60.7" y="208.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start" font-weight="500">softmax(qk/√d)·v — standard SDPA core</text><text x="307.0" y="207.6" font-family="SF Mono, Menlo, Consolas, monospace" font-size="8.5px" fill="#475569" text-anchor="end">known</text><text x="37.5" y="241.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">one shared position grid (f, y, x):</text><text x="37.5" y="262.1" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#475569" text-anchor="start">video token  = (frame, y, x) after 2×2 patchify</text><text x="37.5" y="282.9" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#475569" text-anchor="start">action token = (frame, 1..16, 1)</text><text x="37.5" y="303.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#94A3B8" text-anchor="start">actions are 16 extra “pixels” of their frame —</text><text x="37.5" y="324.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#94A3B8" text-anchor="start">temporal alignment with video comes for free</text><rect x="935.5" y="180.5" width="339.3" height="55.0" rx="7" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.3"/><text x="1105.2" y="198.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#134E4A" text-anchor="middle" font-weight="500">KV cache pool  (inference only)</text><text x="1105.2" y="212.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">pre-alloc (window/2)·(tokens per chunk) slots per layer</text><text x="1105.2" y="224.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="8.5px" fill="#94A3B8" text-anchor="middle">model.py:331-409</text><text x="935.5" y="253.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">update_cache semantics:</text><text x="935.5" y="274.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="start">0 — attend, then free the slots (denoising</text><text x="935.5" y="294.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="start">      iterations leave no trace in the cache)</text><text x="935.5" y="315.6" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="start">1 — keep, marked is_pred (imagined video,</text><text x="935.5" y="336.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="start">      evicted when the real observation arrives)</text><text x="935.5" y="357.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="start">2 — keep as committed history (real obs,</text><text x="935.5" y="378.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="start">      executed actions)</text><text x="935.5" y="398.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#94A3B8" text-anchor="start">pool full → evict oldest insertion ids first</text><rect x="37.5" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.1"/><text x="56.5" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">attention</text><rect x="37.5" y="91.0" width="13.0" height="13.0" rx="3.5" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.1"/><text x="56.5" y="101.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">normalization</text><rect x="142.4" y="91.0" width="13.0" height="13.0" rx="3.5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.1"/><text x="161.4" y="101.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">linear</text><rect x="37.5" y="112.0" width="13.0" height="13.0" rx="3.5" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.1"/><text x="56.5" y="122.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">position/conditioning</text><rect x="37.5" y="133.0" width="13.0" height="13.0" rx="3.5" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.1"/><text x="56.5" y="143.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">cache</text><rect x="102.5" y="133.0" width="13.0" height="13.0" rx="3.5" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.1" stroke-dasharray="3 2"/><text x="121.5" y="143.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">known concept</text></g><g id="labels"><text x="870.5" y="196.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">k, v of history</text><text x="37.5" y="44.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">autoregressive inference. wan_va/modules/model.py:289-465</text><text x="37.5" y="27.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">Standard scaled-dot-product attention at the core (collapsed: known concept); the Wan-specific parts are post-projection QK-RMSNorm, 3D axial RoPE shared by video AND action tokens, and a slot-pool KV cache for</text><text x="37.5" y="10.6" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 4 · WanAttention — what is non-standard inside the attention (code version)</text></g></svg>