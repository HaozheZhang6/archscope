if" font-size="10.5px" fill="#475569" text-anchor="start">DiT (denoiser)</text><rect x="385.0" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.1"/><text x="404.0" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">velocity head</text><rect x="489.3" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.1"/><text x="508.3" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">timestep / text</text><rect x="601.1" y="70.0" width="13.0" height="13.0" rx="3.5" fill="url(#hatch-E0F2FE-B91C1C)" stroke="#B91C1C" stroke-width="1.1"/><text x="620.1" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">noised (being denoised)</text><path d="M 760.8,76.5 L 773.8,76.5" fill="none" stroke="#0D9488" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5 3" marker-end="url(#arr-0D9488)"/><text x="779.8" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">z conditions a</text></g><g id="labels"><text x="250.0" y="94.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0C4A6E" text-anchor="start" font-weight="700">AR axis — interleave &amp; generate chunk by chunk:</text><text x="426.0" y="186.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">chunk t+1 attends ≤ t  ·  KV-cache holds the clean past</text><rect x="301.5" y="340.0" width="299.7" height="19.0" rx="4" fill="#FFFFFF" stroke="#475569" stroke-width="1.1"/><text x="451.3" y="353.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="middle" font-weight="600">DiT block  ×30  (the same shared block · fig 3/4)</text><text x="245.0" y="244.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#6D28D9" text-anchor="start" font-weight="700">diffusion axis — flow-matching denoise of ONE chunk:</text><rect x="398.0" y="183.8" width="216.7" height="15.5" rx="3" fill="#FFFFFF"/><text x="402.0" y="193.3" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="start" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">zoom: z2 is made by denoising (below)</text><rect x="79.2" y="408.8" width="126.8" height="15.5" rx="3" fill="#FFFFFF"/><text x="202.0" y="418.3" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="end" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">×T: integrate s 0 → 1</text><rect x="581.7" y="434.5" width="47.1" height="15.5" rx="3" fill="#FFFFFF"/><text x="605.3" y="444.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">→ AdaLN</text><rect x="572.0" y="401.5" width="36.0" height="15.5" rx="3" fill="#FFFFFF"/><text x="590.0" y="411.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">→ K/V</text><rect x="590.7" y="257.5" width="97.8" height="15.5" rx="3" fill="#FFFFFF"/><text x="639.6" y="267.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">z2 conditions a2</text><text x="60.0" y="558.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">AR is the SEQUENCE axis (interleave z &amp; a, causal, KV-cache, chunk by chunk); diffusion is the WITHIN-CHUNK axis (denoise each chunk through the DiT, s → AdaLN). fig 10b shows both on a</text><text x="60.0" y="572.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">moving clip.</text><text x="60.0" y="53.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">WITHIN-CHUNK axis (diffusion): each chunk starts as noise and is denoised by the shared DiT (timestep s → AdaLN). One DiT does both.</text><text x="60.0" y="37.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">SEQUENCE axis (autoregressive): video chunks (z) and action chunks (a) interleave into one causal sequence, generated chunk by chunk; the KV-cache holds the clean past.</text><text x="60.0" y="20.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 10a · LingBot-VA = AR × diffusion — the STRUCTURE  (see fig 10b for the moving-clip picture)</text></g></svg>