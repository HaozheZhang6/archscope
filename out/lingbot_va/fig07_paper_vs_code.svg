 text-anchor="middle">stream up/down-projects 768↔3072 around the joint attention</text><text x="122.3" y="174.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0C4A6E" text-anchor="middle" font-weight="600">video stream</text><text x="316.3" y="174.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#064E3B" text-anchor="middle" font-weight="600">action stream</text><rect x="64.0" y="185.9" width="166.0" height="44.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="147.0" y="208.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">Norm + QKV</text><text x="147.0" y="222.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 3072</text><rect x="250.0" y="185.9" width="166.0" height="44.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="333.0" y="208.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">Norm + QKV</text><text x="333.0" y="222.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 768 ↑3072</text><rect x="64.0" y="253.9" width="352.0" height="44.0" rx="7" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/><text x="240.0" y="276.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#1E3A8A" text-anchor="middle" font-weight="500">Joint Self-Attention</text><text x="240.0" y="290.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">shared computation, separate weights</text><rect x="64.0" y="321.9" width="166.0" height="44.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="147.0" y="344.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">O proj</text><text x="147.0" y="358.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 3072</text><rect x="250.0" y="321.9" width="166.0" height="44.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="333.0" y="344.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">down-proj + res</text><text x="333.0" y="358.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">3072 ↓768</text><rect x="64.0" y="389.9" width="166.0" height="44.0" rx="7" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.3"/><text x="147.0" y="412.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#14532D" text-anchor="middle" font-weight="500">FFN + norms</text><text x="147.0" y="426.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 3072</text><rect x="250.0" y="389.9" width="166.0" height="44.0" rx="7" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.3"/><text x="333.0" y="412.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#14532D" text-anchor="middle" font-weight="500">FFN + norms</text><text x="333.0" y="426.4" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 768</text><text x="650.4" y="69.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13px" fill="#0F172A" text-anchor="middle" font-weight="600">Released code — shared single stream (≈5.0B)</text><text x="651.2" y="93.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="middle">modality separation only at the boundary: two input embedders,</text><text x="651.2" y="107.9" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="middle">two condition embedders, two output heads; routing done by the</text><text x="651.2" y="122.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="middle">attention mask, not by weights (model.py:624-651)</text><rect x="494.0" y="246.4" width="316.0" height="44.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="652.0" y="269.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">Norm + QKV + O</text><text x="652.0" y="282.9" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 3072 · one set of weights</text><rect x="494.0" y="320.4" width="316.0" height="44.0" rx="7" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.3"/><text x="652.0" y="343.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#1E3A8A" text-anchor="middle" font-weight="500">Self-Attention</text><text x="652.0" y="356.9" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">FlexAttention: causal interleave mask</text><rect x="494.0" y="394.4" width="316.0" height="44.0" rx="7" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/><text x="652.0" y="417.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#0F172A" text-anchor="middle" font-weight="500">Cross-Attn (text) · FFN · norms</text><text x="652.0" y="430.9" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">d = 3072 · shared by video &amp; action tokens</text><text x="685.0" y="242.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.0px" fill="#475569" text-anchor="middle">one stream — video and action tokens flow through identical weights</text><rect x="495.3" y="150.4" width="199.6" height="22.0" rx="11.0" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.1"/><text x="595.1" y="165.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#0C4A6E" text-anchor="middle">patch_embedding_mlp (192→3072)</text><rect x="706.9" y="150.4" width="169.8" height="22.0" rx="11.0" fill="#D1FAE5" stroke="#059669" stroke-width="1.1"/><text x="791.8" y="165.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#064E3B" text-anchor="middle">action_embedder (30→3072)</text><rect x="528.4" y="480.4" width="133.4" height="22.0" rx="11.0" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.1"/><text x="595.1" y="495.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#0C4A6E" text-anchor="middle">proj_out (3072→192)</text><rect x="673.8" y="480.4" width="169.8" height="22.0" rx="11.0" fill="#D1FAE5" stroke="#059669" stroke-width="1.1"/><text x="758.7" y="495.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#064E3B" text-anchor="middle">action_proj_out (3072→30)</text></g><g id="labels"><rect x="428.3" y="122.9" width="39.7" height="19.0" rx="9.5" fill="#FFFFFF" stroke="#64748B" stroke-width="1.2"/><text x="448.2" y="136.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#1E293B" text-anchor="middle" font-weight="600">×30</text><rect x="860.3" y="191.4" width="39.7" height="19.0" rx="9.5" fill="#FFFFFF" stroke="#64748B" stroke-width="1.2"/><text x="880.2" y="205.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#1E293B" text-anchor="middle" font-weight="600">×30</text><text x="60.0" y="550.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">design question</text><text x="460.0" y="550.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">paper</text><text x="740.0" y="550.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#0F172A" text-anchor="start" font-weight="600">released code</text><line x1="60.0" y1="558.4" x2="980.0" y2="558.4" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="butt" /><text x="60.0" y="576.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">joint attention over video+action in one sequence</text><text x="460.0" y="576.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start">yes</text><text x="740.0" y="576.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start">yes (mask-structured)</text><text x="60.0" y="597.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">modality-specific QKV / O / FFN / norms</text><text x="460.0" y="597.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start">yes — the point of MoT</text><text x="740.0" y="597.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#9F1239" text-anchor="start">no — all 30 blocks shared</text><text x="60.0" y="618.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">width asymmetry (video 3072 / action 768)</text><text x="460.0" y="618.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start">yes (+350M action stream)</text><text x="740.0" y="618.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#9F1239" text-anchor="start">no — actions live at 3072</text><text x="60.0" y="639.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">modality-specific time/text embedders &amp; heads</text><text x="460.0" y="639.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start">yes</text><text x="740.0" y="639.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#166534" text-anchor="start">yes (only place weights split)</text><text x="60.0" y="660.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">params</text><text x="460.0" y="660.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">5.3B</text><text x="740.0" y="660.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">≈5.0B (Wan2.2-5B-sized)</text><text x="60.0" y="693.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">Fossil evidence in the release: _keep_in_fp32_modules still lists action_norm1/2/3, text_norm1/2/3, scale_shift_table_action — modules that do not exist in the shipped</text><text x="60.0" y="708.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">WanTransformerBlock (model.py:581-593). The released code matches the “Share Weights” variant from the paper's initialization ablation (paper Fig. 7), not the headline</text><text x="60.0" y="722.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">MoT.</text><text x="40.0" y="40.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">the released code ships a single shared-weight backbone — modality separation lives only at the embedders/heads and in the attention mask.</text><text x="40.0" y="23.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">Both are one joint-attention transformer over interleaved video+action tokens, but the paper describes a dual-stream block with modality-specific weights, while</text><text x="40.0" y="6.6" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Fig 7 · “MoT” in the paper vs. in the released code</text></g></svg>