ll="#475569" text-anchor="start">q = RMSNorm(W_q x), k = RMSNorm(W_k x), v = W_v x. RoPE rotates q,k by their 3D position (fig 2). Reshape to 12 heads,</text><text x="206.0" y="-14.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Wan2.1-VACE-1.3B · 5 · SelfAttention  ·  QK-RMSNorm + 3D RoPE, 12 heads × 128</text></g></svg>