chor="middle" font-weight="500">inactive = video · (1 − mask)</text><text x="593.0" y="174.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">the KEEP region (content preserved)</text><rect x="430.0" y="198.0" width="326.0" height="44.0" rx="7" fill="#F8FAFC" stroke="#64748B" stroke-width="1.3"/><text x="593.0" y="221.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#334155" text-anchor="middle" font-weight="500">reactive = video · mask</text><text x="593.0" y="234.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">the EDIT / generate region</text><rect x="816.0" y="134.0" width="176.0" height="30.0" rx="7" fill="#FFEDD5" stroke="#EA580C" stroke-width="1.3"/><text x="904.0" y="153.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#7C2D12" text-anchor="middle" font-weight="500">VAE encode → 16</text><rect x="816.0" y="194.0" width="176.0" height="30.0" rx="7" fill="#FFEDD5" stroke="#EA580C" stroke-width="1.3"/><text x="904.0" y="213.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#7C2D12" text-anchor="middle" font-weight="500">VAE encode → 16</text><rect x="430.0" y="270.0" width="326.0" height="55.0" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.3"/><text x="593.0" y="288.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#4C1D95" text-anchor="middle" font-weight="500">patchify 8×8 + temporal match</text><text x="593.0" y="301.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">T (H·8) (W·8) → (8·8=64), interp to f</text><text x="593.0" y="313.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="8.5px" fill="#94A3B8" text-anchor="middle">wan_video.py:682</text><rect x="1062.0" y="206.0" width="196.0" height="44.0" rx="7" fill="#FFFFFF" stroke="#475569" stroke-width="1.3"/><text x="1160.0" y="229.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12.5px" fill="#334155" text-anchor="middle" font-weight="500">concat channels</text><text x="1160.0" y="242.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle">16 + 16 + 64 = 96</text><rect x="1308.0" y="217.0" width="243.6" height="22.0" rx="11.0" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/><text x="1429.8" y="231.6" font-family="SF Mono, Menlo, Consolas, monospace" font-size="10.0px" fill="#78350F" text-anchor="middle">vace_context  (96, f, h, w)   → fig 9</text><rect x="70.0" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.1"/><text x="89.0" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">pixels / mask</text><rect x="172.8" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#F8FAFC" stroke="#64748B" stroke-width="1.1"/><text x="191.8" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">masked halves</text><rect x="284.7" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#FFEDD5" stroke="#EA580C" stroke-width="1.1"/><text x="303.7" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">VAE encode</text><rect x="381.2" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.1"/><text x="400.2" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">mask patchify</text><rect x="488.8" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#FFFFFF" stroke="#475569" stroke-width="1.1"/><text x="507.8" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">concat</text><rect x="558.1" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/><text x="577.1" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">control latent</text><path d="M 662.7,102.5 L 675.7,102.5" fill="none" stroke="#0D9488" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5 3" marker-end="url(#arr-0D9488)"/><text x="681.7" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">mask path</text></g><g id="labels"><rect x="1030.0" y="175.7" width="52.0" height="15.5" rx="3" fill="#FFFFFF"/><text x="1034.0" y="185.2" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="start" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">16  keep</text><rect x="983.7" y="193.5" width="51.7" height="15.5" rx="3" fill="#FFFFFF"/><text x="1009.5" y="203.0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">16  edit</text><rect x="869.5" y="282.0" width="53.0" height="15.5" rx="3" fill="#FFFFFF"/><text x="896.0" y="291.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">64  mask</text><text x="70.0" y="365.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">Channel accounting: the two VAE encodings give 16+16=32 latent channels carrying the kept and the to-be-generated pixels; the 64-channel mask tells the model, per latent patch, how</text><text x="70.0" y="378.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">much is fixed vs free. A reference image (optional) is prepended along the frame axis. (With no control, vace_context is all zeros and VACE is a no-op.)</text><text x="70.0" y="79.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">the input to the VACE branch (fig 9).</text><text x="70.0" y="63.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">inactive = video·(1−mask) [keep region], reactive = video·mask [edit region]; each is VAE-encoded to 16 latent channels. The mask is patchified 8×8 into 64 channels and temporally matched to the latent frames. Concatenate → vace_context (96, f, h, w),</text><text x="70.0" y="46.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Wan2.1-VACE-1.3B · 8 · the control signal — vace_context = 96 channels (16 + 16 + 64)</text></g></svg>