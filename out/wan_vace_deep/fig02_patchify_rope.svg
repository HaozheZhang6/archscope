"Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">f·(h/2)·(w/2) tokens of width 1536. 3D RoPE gives each token a (frame,row,col) position and rotates q,k; the 128-d head is split 44/42/42 across</text><text x="70.0" y="46.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">patch_embedding = Conv3d(16→1536, kernel=stride=(1,2,2)): no temporal patching, 2×2 spatial. Flatten (f,h,w) → a sequence of L =</text><text x="70.0" y="29.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Wan2.1-VACE-1.3B · 2 · latent → tokens: strided Conv3d patchify, then 3D RoPE positions</text></g></svg>