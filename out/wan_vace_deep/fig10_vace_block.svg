.0" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">control tokens</text><rect x="188.5" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.1"/><text x="207.5" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">main latent</text><rect x="282.5" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#475569" stroke-width="1.1"/><text x="301.5" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">DiT block (fig 4)</text><rect x="399.0" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/><text x="418.0" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">VACE Linear (trained)</text><rect x="545.6" y="96.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.1"/><text x="564.6" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">hint</text><path d="M 599.7,102.5 L 612.7,102.5" fill="none" stroke="#334155" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arr-334155)"/><text x="618.7" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">data flow</text><path d="M 682.3,102.5 L 695.3,102.5" fill="none" stroke="#DB2777" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5 3" marker-end="url(#arr-DB2777)"/><text x="701.3" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">text/t/RoPE</text><path d="M 774.5,102.5 L 787.5,102.5" fill="none" stroke="#CBD5E1" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arr-CBD5E1)"/><text x="793.5" y="106.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">running stream</text></g><g id="labels"><rect x="405.0" y="316.0" width="24.4" height="15.5" rx="3" fill="#FFFFFF"/><text x="417.2" y="325.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">+ x</text><text x="781.9" y="268.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">the block's output c also continues to</text><text x="781.9" y="281.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">the next VACE block (the running</text><text x="781.9" y="295.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">stream); after_proj only TAPS a copy</text><rect x="812.4" y="259.0" width="87.0" height="15.5" rx="3" fill="#FFFFFF"/><text x="855.9" y="268.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">c → next block</text><text x="80.0" y="372.5" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">Why a zero-conv? With after_proj (and before_proj) initialized to zero, the very first training step injects exactly</text><text x="80.0" y="385.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">nothing, so the frozen main DiT keeps its pretrained behaviour and VACE learns its control signal as a residual on top</text><text x="80.0" y="399.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">— the ControlNet recipe.</text><text x="80.0" y="79.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">+ AdaLN, fig 4), then hint = after_proj(c). after_proj is the zero-conv — weights init 0, so an untrained VACE adds nothing.</text><text x="80.0" y="63.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">block 0: c ← before_proj(c) + x (seed the control stream with the main latent). Every block: run the full DiTBlock on c (self-attn + cross-attn(text) + FFN</text><text x="80.0" y="46.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Wan2.1-VACE-1.3B · 10 · VaceWanAttentionBlock  ·  a DiT block wrapped with before/after_proj</text></g></svg>