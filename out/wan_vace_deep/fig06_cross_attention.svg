tica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">no 3D position. (The I2V variant adds a parallel image K/V; VACE T2V does not use it.)</text><text x="330.0" y="33.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">The query length is L (video tokens); the key/value length is 512 (UMT5 text). No RoPE here — text carries</text><text x="330.0" y="16.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">q = RMSNorm(W_q · video_tokens), k = RMSNorm(W_k · text), v = W_v · text. Attention(q,k,v), then W_o.</text><text x="330.0" y="-0.2" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Wan2.1-VACE-1.3B · 6 · CrossAttention  ·  video tokens query the text context</text></g></svg>