rx="3.5" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.1"/><text x="99.0" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">tokens / latent</text><rect x="190.2" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#475569" stroke-width="1.1"/><text x="209.2" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">main block (+ hint here)</text><rect x="351.8" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.1"/><text x="370.8" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">odd block (no hint)</text><rect x="484.5" y="70.0" width="13.0" height="13.0" rx="3.5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.1"/><text x="503.5" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">VACE branch</text><circle cx="592.4" cy="76.5" r="6.5" fill="#FFFFFF" stroke="#475569" stroke-width="1.2"/><line x1="589.1" y1="76.5" x2="595.6" y2="76.5" stroke="#475569" stroke-width="1.5" stroke-linecap="butt" /><line x1="592.4" y1="73.2" x2="592.4" y2="79.8" stroke="#475569" stroke-width="1.5" stroke-linecap="butt" /><text x="604.9" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">add hint</text><path d="M 663.5,76.5 L 676.5,76.5" fill="none" stroke="#0D9488" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5 3" marker-end="url(#arr-0D9488)"/><text x="682.5" y="80.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="10.5px" fill="#475569" text-anchor="start">hint · vace_scale</text></g><g id="labels"><rect x="358.6" y="418.0" width="86.6" height="15.5" rx="3" fill="#FFFFFF"/><text x="401.9" y="427.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">hint@0 · scale</text><rect x="316.4" y="300.0" width="86.6" height="15.5" rx="3" fill="#FFFFFF"/><text x="359.8" y="309.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">hint@2 · scale</text><rect x="355.7" y="168.0" width="92.3" height="15.5" rx="3" fill="#FFFFFF"/><text x="401.9" y="177.5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="9.5px" fill="#475569" text-anchor="middle" paint-order="stroke" stroke="#FFFFFF" stroke-width="3px">hint@28 · scale</text><text x="330.0" y="561.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#475569" text-anchor="start">the 30 main layers — amber = receives a VACE hint (even), grey = plain:</text><text x="330.0" y="637.0" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">Note the timing (DiffSynth): all 15 hints are computed up front from the INITIAL tokens, then added as the main blocks run — the</text><text x="330.0" y="650.3" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9.5px" fill="#94A3B8" text-anchor="start">VACE branch does not re-read the main stream between blocks. The hint is a residual; vace_scale=0 recovers the plain Wan2.1 DiT.</text><text x="80.0" y="53.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">strength.</text><text x="80.0" y="37.1" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">vace_hints[map[block_id]] · vace_scale. So 15 of 30 main blocks receive a hint; the others are untouched. vace_scale (default 1.0) tunes control</text><text x="80.0" y="20.4" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11.5px" fill="#475569" text-anchor="start">vace_hints = vace(x, vace_context, …) is computed once (fig 9). Then for block_id in 0..29: x = block(x); if block_id in {0,2,…,28}: x = x +</text><text x="80.0" y="3.8" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="17px" fill="#0F172A" text-anchor="start" font-weight="600">Wan2.1-VACE-1.3B · 11 · injection — vace_hints added after every other main block</text></g></svg>